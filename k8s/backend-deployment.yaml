apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-backend
  namespace: workflow-dashboard
  labels:
    app: workflow-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workflow-backend
  template:
    metadata:
      labels:
        app: workflow-backend
    spec:
      containers:
        - name: backend
          image: ACR_REGISTRY/workflow-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: workflow-dashboard-secrets
                  key: GITHUB_CLIENT_ID
                  optional: true
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: workflow-dashboard-secrets
                  key: GITHUB_CLIENT_SECRET
                  optional: true
            - name: GITHUB_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: workflow-dashboard-secrets
                  key: GITHUB_REDIRECT_URI
                  optional: true
            - name: CORS_ORIGINS
              value: "*"
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-backend
  namespace: workflow-dashboard
  labels:
    app: workflow-backend
spec:
  type: LoadBalancer
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: workflow-backend
