name: CI/CD
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency: cicd-${{ github.ref }}
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test || true

  cd:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: ACR Login
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin
      - name: Build and push frontend image
        if: contains(fromJson('["Dockerfile.frontend"]'), 'Dockerfile.frontend')
        run: |
          docker build -f Dockerfile.frontend -t ${{ secrets.ACR_LOGIN_SERVER }}/workflow-frontend:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/workflow-frontend:latest
      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml
      - name: Apply frontend deployment
        if: contains(fromJson('["k8s/frontend-deployment.yaml"]'), 'k8s/frontend-deployment.yaml')
        run: kubectl apply -f k8s/frontend-deployment.yaml
      - name: Check frontend rollout status
        if: contains(fromJson('["k8s/frontend-deployment.yaml"]'), 'k8s/frontend-deployment.yaml')
        run: kubectl rollout status deployment/frontend -n workflow-dashboard
      - name: Show services
        run: kubectl get svc -n workflow-dashboard
      - name: Show public IP
        run: |
          kubectl get svc -n workflow-dashboard -o jsonpath='{.items[?(@.spec.type=="LoadBalancer")].status.loadBalancer.ingress[0].ip}'