name: CI/CD
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency: cicd-${{ github.ref }}
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test || true
  cd:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: ACR Login
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin
      - name: Build and push frontend image
        if: has_frontend == 'True'
        run: |
          docker build -f Dockerfile.frontend \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.BACKEND_PUBLIC_URL || 'http://localhost:3000' }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/workflow-frontend:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/workflow-frontend:latest
      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          if [ "${{ has_frontend }}" == "True" ]; then
            kubectl apply -f k8s/frontend-deployment.yaml
          fi
      - name: Check rollout status
        run: |
          if [ "${{ has_frontend }}" == "True" ]; then
            kubectl rollout status deployment/frontend-deployment -n workflow-dashboard
          fi
      - name: Show services
        run: kubectl get svc -n workflow-dashboard