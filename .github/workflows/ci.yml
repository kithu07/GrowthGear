name: CI/CD Pipeline
'on':
  push:
    branches:
    - main
  workflow_dispatch: {}
concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install Dependencies
      run: npm install
    - name: Run Tests (optional)
      run: "if npm run 2>&1 | grep -q \"test\"; then\n  npm test\nelse\n  echo \"\
        No test script found, skipping tests\"\nfi"
  cd:
    name: CD (ACR + AKS)
    runs-on: ubuntu-latest
    needs:
    - ci
    steps:
    - uses: actions/checkout@v4
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Login to ACR
      uses: azure/docker-login@v2
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}
    - name: Build and push backend
      run: docker build -f Dockerfile.backend -t ${{ secrets.ACR_LOGIN_SERVER }}/workflow-backend:latest
        . && docker push ${{ secrets.ACR_LOGIN_SERVER }}/workflow-backend:latest
    - name: Build and push frontend
      run: API_URL="${{ secrets.BACKEND_PUBLIC_URL }}"; if [ -z "$API_URL" ]; then
        API_URL="http://localhost:8000"; fi; docker build -f Dockerfile.frontend --build-arg
        NEXT_PUBLIC_API_URL="$API_URL" -t ${{ secrets.ACR_LOGIN_SERVER }}/workflow-frontend:latest
        . && docker push ${{ secrets.ACR_LOGIN_SERVER }}/workflow-frontend:latest
    - name: Install kubectl
      run: curl -sSL "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        -o kubectl && chmod +x kubectl && sudo mv kubectl /usr/local/bin/
    - name: Get AKS credentials
      run: az aks get-credentials --resource-group ${{ secrets.AKS_RESOURCE_GROUP
        }} --name ${{ secrets.AKS_CLUSTER_NAME }} --overwrite-existing
    - name: Deploy to AKS
      run: ACR="${{ secrets.ACR_LOGIN_SERVER }}"; for f in k8s/namespace.yaml k8s/backend-deployment.yaml
        k8s/frontend-deployment.yaml; do sed "s|ACR_REGISTRY|${ACR}|g" "$f" | kubectl
        apply -f -; done; kubectl rollout status deployment/workflow-backend -n workflow-dashboard
        --timeout=180s; kubectl rollout status deployment/workflow-frontend -n workflow-dashboard
        --timeout=180s
    - name: Show services
      run: kubectl get svc -n workflow-dashboard
